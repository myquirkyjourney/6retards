<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Retards + Chickens</title>
    <link href="https://fonts.googleapis.com/css2?family=Century+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            font-family: 'Century Gothic', sans-serif;
            background-color: #b8b8b8;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
        }
        
        .logo-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .logo {
            max-width: 80vw;
            max-height: 80vh;
            width: auto;
            height: auto;
            object-fit: contain;
            opacity: 0.9;
            mix-blend-mode: multiply;
            transition: opacity 0.5s ease;
        }
        
        /* Hamburger Menu */
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .menu-toggle:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }
        
        .hamburger {
            width: 24px;
            height: 20px;
            position: relative;
        }
        
        .hamburger span {
            display: block;
            position: absolute;
            height: 3px;
            width: 100%;
            background: #4f5974;
            border-radius: 3px;
            opacity: 1;
            left: 0;
            transform: rotate(0deg);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hamburger span:nth-child(1) {
            top: 0px;
        }
        
        .hamburger span:nth-child(2) {
            top: 8px;
        }
        
        .hamburger span:nth-child(3) {
            top: 16px;
        }
        
        .menu-toggle.active .hamburger span:nth-child(1) {
            top: 8px;
            transform: rotate(135deg);
        }
        
        .menu-toggle.active .hamburger span:nth-child(2) {
            opacity: 0;
            left: -60px;
        }
        
        .menu-toggle.active .hamburger span:nth-child(3) {
            top: 8px;
            transform: rotate(-135deg);
        }
        
        /* Menu Panel */
        .menu-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            overflow-y: auto;
        }
        
        .menu-panel.active {
            right: 0;
        }
        
        .menu-header {
            padding: 30px 20px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .menu-header h3 {
            color: #4f5974;
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .menu-header p {
            color: #666;
            font-size: 0.9em;
        }
        
        .menu-items {
            padding: 20px 0;
        }
        
        .menu-item {
            display: block;
            padding: 15px 20px;
            color: #1d1d1f;
            text-decoration: none;
            font-weight: 400;
            font-size: 1.1em;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .menu-item:hover {
            background: rgba(79, 89, 116, 0.1);
            padding-left: 30px;
        }
        
        .menu-item:first-child {
            background: rgba(79, 89, 116, 0.05);
            font-weight: 700;
        }
        
        .menu-item:first-child:hover {
            background: rgba(79, 89, 116, 0.15);
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 998;
        }
        
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 15px 0;
            color: rgba(0, 0, 0, 0.7);
            font-size: 0.8em;
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Logo dim when menu open */
        .logo.dimmed {
            opacity: 0.3;
        }
        
        @media (max-width: 768px) {
            .menu-panel {
                width: 280px;
                right: -280px;
            }
            
            .menu-toggle {
                top: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
            }
            
            .logo {
                max-width: 90vw;
                max-height: 90vh;
            }
        }
    </style>
</head>
<body>
    <!-- Hamburger Menu -->
    <div class="menu-toggle" id="menuToggle">
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <!-- Menu Panel -->
    <div class="menu-panel" id="menuPanel">
        <div class="menu-header">
            <h3>6 Retards + Chickens</h3>
            <p>Navigation</p>
        </div>
        <div class="menu-items">
            <a href="/chickens.html" class="menu-item">🐔 Chickens</a>
            <a href="#" class="menu-item">📊 Business Plan</a>
            <a href="#" class="menu-item">📅 Timeline</a>
            <a href="#" class="menu-item">💰 Budget</a>
            <a href="#" class="menu-item">🏡 Infrastructure</a>
            <a href="#" class="menu-item">📈 Projections</a>
            <a href="#" class="menu-item">👥 Family</a>
            <a href="#" class="menu-item">📝 Notes</a>
        </div>
    </div>
    
    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>
    
    <!-- Main Content -->
    <div class="logo-container">
        <img src="gr-logoa.png" alt="6 Retards Logo" class="logo" id="logo">
    </div>
    
    <!-- Footer -->
    <div class="footer">
        <p>© 2026 6 retards | sustainable family farming</p>
    </div>
    
    <script>
        // Menu functionality
        const menuToggle = document.getElementById('menuToggle');
        const menuPanel = document.getElementById('menuPanel');
        const overlay = document.getElementById('overlay');
        const logo = document.getElementById('logo');
        
        function toggleMenu() {
            menuToggle.classList.toggle('active');
            menuPanel.classList.toggle('active');
            overlay.classList.toggle('active');
            logo.classList.toggle('dimmed');
        }
        
        menuToggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
        
        // Close menu when clicking a link
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                toggleMenu();
            });
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuPanel.classList.contains('active')) {
                toggleMenu();
            }
        });
    </script>
</body>
</html>
