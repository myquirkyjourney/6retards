<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Retards + Chickens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #1d1d1f;
            background-color: #f5f5f7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            padding: 60px 40px;
        }
        
        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto 40px auto;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50%;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo img {
            width: 100%;
            height: auto;
            border-radius: 50%;
            object-fit: cover;
        }
        
        h1 {
            font-size: 4em;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
            background: linear-gradient(180deg, #4f5974 0%, #2c3e50 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.4em;
            font-weight: 400;
            color: #424245;
            margin-bottom: 50px;
            line-height: 1.5;
        }
        
        .nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 12px;
            display: inline-flex;
            gap: 8px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            margin: 40px 0;
        }
        
        .nav a {
            color: #1d1d1f;
            text-decoration: none;
            font-weight: 500;
            padding: 16px 32px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-size: 1.1em;
        }
        
        .nav a:hover {
            background: rgba(79, 89, 116, 0.1);
            transform: translateY(-2px);
        }
        
        .footer-text {
            margin-top: 60px;
            color: #86868b;
            font-size: 1.1em;
            font-weight: 400;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 3em;
            }
            
            .logo {
                width: 140px;
                height: 140px;
                padding: 20px;
            }
            
            .nav {
                flex-direction: column;
                gap: 8px;
            }
            
            .nav a {
                text-align: center;
            }
        }
        
        /* Smooth transitions */
        * {
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="6rlogo.png" alt="6 Retards Logo">
        </div>
        <h1>6 Retards + Chickens</h1>
        <p class="subtitle">We don't know what we're doing, but we're having fun anyway</p>
        
        <nav class="nav">
            <a href="/">Home</a>
            <a href="/chickens.html">View Chicken Business Plan</a>
        </nav>
        
        <p class="footer-text">Learning by failing, one chicken at a time</p>
    </div>
</body>
</html>
